name: CodeQL

# This workflow exists to override GitHub's Default Setup for code scanning.
#
# CodeQL does not support Rust. The Python bindings (invars-py) are a PyO3
# native extension that requires Rust compilation to be importable — the
# CodeQL Python extractor's pre-finalize script cannot run against this
# type of project without first building the extension.
#
# Disabling code scanning here is intentional and correct for this project.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL (skipped)
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: |
          echo "CodeQL analysis skipped."
          echo "  - Rust is not supported by CodeQL."
          echo "  - Python bindings (PyO3/maturin) require native compilation"
          echo "    not available in this environment."
